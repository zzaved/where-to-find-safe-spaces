name: safe_spaces
description: "Where to find safe spaces — encontre locais acolhedores para a comunidade LGBTQIA+ por proximidade."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management + value equality
  flutter_riverpod: ^2.6.1
  equatable: ^2.0.7

  # Backend / config
  supabase_flutter: ^2.8.0
  flutter_dotenv: ^5.2.1

  # Device hardware & OS integrations
  geolocator: ^13.0.2                 # GPS / localização (hardware)
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  share_plus: ^10.1.2                 # compartilhamento nativo
  url_launcher: ^6.3.1                # abrir links de reviews/sites

  # UI helpers
  cached_network_image: ^3.4.1
  shared_preferences: ^2.3.3
  intl: ^0.20.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
